services:
  - type: web
    name: synapse-nexus-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: JWT_SECRET
        value: synapse-nexus-production-secret-2025
      - key: FRONTEND_URL
        value: https://synapse-nexus.vercel.app
      - key: PYTHON_VERSION
        value: 3.11.0
